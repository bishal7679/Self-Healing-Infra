# ArgoCD Application manifest for GitOps auto-sync
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: self-healing-infra
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/bishal7679/self-healing-infra.git  # Update with your repo
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true        # Remove resources not in Git
      selfHeal: true     # Auto-sync if cluster drifts from Git
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
