# Secret for Jules API key
# Generate: echo -n "your-jules-api-key" | base64
# Or use: kubectl create secret generic self-healing-secrets --from-literal=jules-api-key="YOUR_KEY"
apiVersion: v1
kind: Secret
metadata:
  name: self-healing-secrets
  namespace: default
  labels:
    app: self-healing
type: Opaque
data:
  # Get your Jules API key from: https://jules.google.com/settings#api
  # echo -n "your-jules-api-key" | base64
  jules-api-key: REPLACE_WITH_BASE64_ENCODED_KEY
