# Demo app that intentionally crashes with OOMKilled
# Used to test the self-healing system
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: default
  labels:
    app: demo-app
    purpose: self-healing-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
        purpose: self-healing-test
    spec:
      containers:
        - name: demo-app
          image: nginx:1.27-alpine
          resources:
            limits:
              memory: "64Mi"
              cpu: "50m"
            requests:
              memory: "32Mi"
              cpu: "5m"
