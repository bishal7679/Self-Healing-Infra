# Demo app that intentionally crashes with OOMKilled
# Used to test the self-healing system
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: default
  labels:
    app: demo-app
    purpose: self-healing-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
        purpose: self-healing-test
    spec:
      containers:
        - name: demo-app
          image: polinux/stress
          # stress tool: allocates 200MB which exceeds 64Mi limit → OOMKilled
          args: ["stress", "--vm", "1", "--vm-bytes", "200M", "--vm-hang", "1"]
          resources:
            limits:
              memory: "512Mi"
              cpu: "50m"
            requests:
              memory: "256Mi"
              cpu: "5m"
