# Demo app that intentionally crashes with OOMKilled
# Used to test the self-healing system
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: default
  labels:
    app: demo-app
    purpose: self-healing-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
        purpose: self-healing-test
    spec:
      containers:
        - name: demo-app
          image: polinux/stress
          # Tries to allocate 200MB, increased limit to 1024Mi to prevent OOM
          args: ["stress", "--vm", "1", "--vm-bytes", "200M", "--vm-hang", "1"]
          resources:
            limits:
              memory: "1024Mi"
              cpu: "500m"
            requests:
              memory: "512Mi"
              cpu: "250m"
