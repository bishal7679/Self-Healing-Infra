# ServiceAccount for the self-healing analyzer
apiVersion: v1
kind: ServiceAccount
metadata:
  name: self-healing-sa
  namespace: default
  labels:
    app: self-healing

---
# ClusterRole to watch pods and read logs across all namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: self-healing-role
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "watch", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]

---
# Bind the ClusterRole to the ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: self-healing-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: self-healing-role
subjects:
  - kind: ServiceAccount
    name: self-healing-sa
    namespace: default
